<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITFAB — Acceso al Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./public/css/login.css">
</head>
<body>

<div class="login-bg">

    <!-- Glows de fondo -->
    <div class="bg-glow bg-glow--1"></div>
    <div class="bg-glow bg-glow--2"></div>
    <div class="bg-glow bg-glow--3"></div>

    <!-- Card principal -->
    <div class="login-card">

        <!-- Marca: logo arriba, título abajo -->
        <div class="card-brand">
            <img src="./public/img/fitfab.jpg" alt="FITFAB" class="card-logo">
            <h1 class="card-brand-name">FIT<span>FAB</span></h1>
            <p class="card-brand-sub">Sistema de Gestión</p>
        </div>

        <div class="card-sep"></div>

        <!-- Encabezado -->
        <h2 class="card-title">Bienvenido de nuevo</h2>
        <p class="card-subtitle">Ingresa tus credenciales para acceder al sistema</p>

        <!-- Formulario -->
        <form id="formLogin" autocomplete="off">

            <!-- Usuario -->
            <div class="field-group">
                <input type="text" class="field-input" id="inputUsuario"
                    autocomplete="off" required placeholder=" ">
                <label for="inputUsuario" class="field-label">Usuario</label>
                <span class="field-line"></span>
            </div>

            <!-- Contraseña -->
            <div class="field-group">
                <input type="password" class="field-input" id="inputPassword"
                    required placeholder=" ">
                <label for="inputPassword" class="field-label">Contraseña</label>
                <button type="button" class="field-eye" id="togglePassword" tabindex="-1">
                    <i class="fa-regular fa-eye" id="eyeIcon"></i>
                </button>
                <span class="field-line"></span>
            </div>

            <!-- Botón -->
            <button type="submit" id="btnSubmit" class="btn-login">
                Iniciar Sesión
                <i class="fa-solid fa-arrow-right-long ms-2"></i>
            </button>

        </form>

        <!-- ¿Olvidaste? -->
        <div class="card-forgot">
            <a href="#" class="card-link"
                onclick="alert('Contacte al administrador del sistema.'); return false;">
                <i class="fa-solid fa-circle-question me-1"></i>¿Olvidaste tu contraseña?
            </a>
        </div>

        <!-- Copyright -->
        <p class="card-copy">&copy; 2026 FITFAB</p>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabaseConfig.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const toggle = document.getElementById('togglePassword');
        const pwd    = document.getElementById('inputPassword');
        const eye    = document.getElementById('eyeIcon');
        toggle.addEventListener('click', function () {
            const isPass = pwd.type === 'password';
            pwd.type = isPass ? 'text' : 'password';
            eye.classList.toggle('fa-eye',       !isPass);
            eye.classList.toggle('fa-eye-slash',  isPass);
        });
    });
</script>
<script src="./public/js/login.js"></script>
</body>
</html>
