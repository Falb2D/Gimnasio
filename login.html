<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITFAB S.A.C. — Acceso al Sistema</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Login CSS -->
    <link rel="stylesheet" href="./public/css/login.css">
</head>
<body>

<div class="login-wrapper">

    <!-- ===== PANEL IZQUIERDO — MARCA ===== -->
    <div class="login-brand">
        <div class="brand-logo-wrap">
            <img src="./public/img/fitfab.jpg" alt="FITFAB Logo" class="brand-logo">
        </div>
        <h1 class="brand-name">FIT<span>FAB</span></h1>
        <p class="brand-company">S.A.C.</p>
        <div class="brand-divider"></div>
        <p class="brand-tagline">Sistema de Gestión Integral</p>
        <p class="brand-slogan">"Transforma cuerpos,<br>transforma vidas."</p>
    </div>

    <!-- ===== PANEL DERECHO — FORMULARIO ===== -->
    <div class="login-form-panel">
        <div class="login-form-content">

            <h2 class="form-title">Bienvenido</h2>
            <p class="form-subtitle">Ingresa tus credenciales para acceder al sistema.</p>

            <form id="formLogin" autocomplete="off">

                <!-- Usuario -->
                <div class="mb-4">
                    <label for="inputUsuario" class="form-label-custom">Usuario</label>
                    <div class="input-group input-group-lg input-group-dark rounded-3 overflow-hidden">
                        <span class="input-group-text">
                            <i class="fa-solid fa-user fa-fw"></i>
                        </span>
                        <input type="text" class="form-control" id="inputUsuario"
                            placeholder="Ingresa tu usuario" autocomplete="off" required>
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="mb-4">
                    <label for="inputPassword" class="form-label-custom">Contraseña</label>
                    <div class="input-group input-group-lg input-group-dark rounded-3 overflow-hidden">
                        <span class="input-group-text">
                            <i class="fa-solid fa-lock fa-fw"></i>
                        </span>
                        <input type="password" class="form-control" id="inputPassword"
                            placeholder="Ingresa tu contraseña" required>
                        <span class="input-group-text password-toggle" id="togglePassword">
                            <i class="fa-regular fa-eye" id="eyeIcon"></i>
                        </span>
                    </div>
                </div>

                <!-- Botón -->
                <button type="submit" id="btnSubmit" class="btn-login-primary">
                    Iniciar Sesión <i class="fa-solid fa-arrow-right"></i>
                </button>

            </form>

            <hr class="divider-line">

            <div class="text-center">
                <a href="#" class="login-footer-link"
                    onclick="alert('Contacte al administrador del sistema para recuperar sus credenciales.'); return false;">
                    <i class="fa-solid fa-circle-question me-1"></i>
                    ¿Olvidaste tu contraseña?
                </a>
            </div>

            <p class="login-copyright">
                FITFAB S.A.C. &copy; 2025 — Acceso restringido al personal autorizado
            </p>

        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabaseConfig.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput  = document.getElementById('inputPassword');
        const eyeIcon        = document.getElementById('eyeIcon');

        togglePassword.addEventListener('click', function () {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            eyeIcon.classList.toggle('fa-eye',       !isPassword);
            eyeIcon.classList.toggle('fa-eye-slash',  isPassword);
        });
    });
</script>
<script src="./public/js/login.js"></script>
</body>
</html>
