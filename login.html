<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITFAB S.A.C. - Login Staff</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            /* Fondo temático de gimnasio con una capa oscura encima */
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        
        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        .login-header {
            background-color: #0d6efd; /* Azul corporativo */
            padding: 35px 20px;
            text-align: center;
            color: white;
        }

        .login-body {
            background-color: white;
            padding: 40px 30px 30px;
        }

        /* Estilización moderna de los inputs para que parezcan una sola caja unida con los iconos */
        .input-group-text {
            background-color: #f8fafc;
            border-right: none;
            color: #64748b;
        }

        .form-control {
            border-left: none;
            background-color: #f8fafc;
        }
        
        .form-control:focus {
            box-shadow: none;
            background-color: #fff;
            border-color: #dee2e6;
        }

        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control {
            background-color: #fff;
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }

        .password-toggle {
            cursor: pointer;
            border-left: none;
            background-color: #f8fafc;
            color: #64748b;
        }

        .password-toggle:hover {
            color: #0d6efd;
        }
        
        .btn-login {
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(13, 110, 253, 0.3);
        }
    </style>
</head>
<body>

    <div class="container px-3 d-flex justify-content-center">
        <!-- Tarjeta de Login -->
        <div class="card border-0 login-card">
            
            <div class="login-header">
                <div class="bg-white text-primary rounded-circle d-inline-flex justify-content-center align-items-center mb-3 shadow" style="width: 65px; height: 65px;">
                    <i class="fa-solid fa-dumbbell fs-2"></i>
                </div>
                <h4 class="fw-bold mb-1" style="letter-spacing: 1px;">FITFAB S.A.C.</h4>
                <p class="mb-0 text-white-50 small text-uppercase fw-bold" style="letter-spacing: 2px;">Portal del Staff</p>
            </div>

            <div class="login-body">
                <form id="formLogin">
                    <div class="mb-4">
                        <label for="email" class="form-label fw-bold text-secondary small text-uppercase" style="letter-spacing: 0.5px;">Correo Electrónico</label>
                        <div class="input-group input-group-lg shadow-sm rounded-3 overflow-hidden">
                            <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                            <input type="email" class="form-control fs-6" id="email" placeholder="usuario@fitfab.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold text-secondary small text-uppercase" style="letter-spacing: 0.5px;">Contraseña</label>
                        <div class="input-group input-group-lg shadow-sm rounded-3 overflow-hidden">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" class="form-control fs-6" id="password" placeholder="••••••••" required>
                            <!-- Botón de ojito -->
                            <span class="input-group-text password-toggle" id="togglePassword">
                                <i class="fa-regular fa-eye" id="eyeIcon"></i>
                            </span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 btn-login shadow-sm mt-3">
                        Iniciar Sesión <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>
                </form>

                <!-- Enlace de recuperación -->
                <div class="text-center mt-4">
                    <a href="#" class="text-decoration-none text-muted small fw-medium" onclick="alert('Contacte a Soporte de TI o al Gerente para recuperar sus credenciales.')">
                        <i class="fa-solid fa-circle-question me-1"></i> ¿Olvidaste tu contraseña? Contacta al administrador.
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // 1. Lógica para Mostrar/Ocultar contraseña (Ojito)
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            togglePassword.addEventListener('click', function () {
                // Alternar el atributo type (password <=> text)
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                // Alternar la clase del ícono de FontAwesome
                if(type === 'text') {
                    eyeIcon.classList.remove('fa-eye');
                    eyeIcon.classList.add('fa-eye-slash');
                } else {
                    eyeIcon.classList.remove('fa-eye-slash');
                    eyeIcon.classList.add('fa-eye');
                }
            });

            // 2. Simular Login (Captura de Submit)
            const formLogin = document.getElementById('formLogin');
            
            formLogin.addEventListener('submit', function(e) {
                e.preventDefault(); // Evita recargar la página
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                // Imprimir credenciales en consola como se solicitó
                console.log('--- INTENTO DE INICIO DE SESIÓN (STAFF) ---');
                console.log('Email:', email);
                console.log('Password:', password);
                
                // Animación visual de "cargando" en el botón
                const btnSubmit = formLogin.querySelector('button[type="submit"]');
                const originalText = btnSubmit.innerHTML;
                
                btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Autenticando...';
                btnSubmit.disabled = true;
                
                // Simular un delay de conexión a la base de datos (1.5 segundos)
                setTimeout(() => {
                    // Restaurar botón a su estado original
                    btnSubmit.innerHTML = originalText;
                    btnSubmit.disabled = false;
                    
                    alert(`Login simulado correctamente para:\n${email}\n\nRevisa la consola (F12) para ver los datos capturados.`);
                    
                    // En el proyecto real, aquí rediriges dependiendo del rol:
                    // window.location.href = 'views/admin/index.html';
                }, 1500);
            });
        });
    </script>
</body>
</html>
