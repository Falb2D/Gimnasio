<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITFAB S.A.C. - Login Staff</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilos modulares -->
    <link rel="stylesheet" href="../public/css/login.css">
</head>
<body class="bg-image bg-staff">

    <div class="container px-3 d-flex justify-content-center">
        <!-- Tarjeta de Login -->
        <div class="login-card">
            
            <div class="logo-circle logo-staff">
                <i class="fa-solid fa-dumbbell"></i>
            </div>
            
            <div class="text-center mb-4">
                <h4 class="fw-bold mb-1" style="letter-spacing: 1px;">FITFAB S.A.C.</h4>
                <p class="mb-0 text-secondary small text-uppercase fw-bold" style="letter-spacing: 2px;">Portal del Staff</p>
            </div>

            <div class="login-body">
                <form id="formLogin" autocomplete="off">
                    <div class="mb-4">
                        <label for="inputUsuario" class="form-label fw-bold text-secondary small text-uppercase" style="letter-spacing: 0.5px;">Usuario o DNI</label>
                        <div class="input-group input-group-lg shadow-sm rounded-3 overflow-hidden">
                            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                            <input type="text" class="form-control fs-6" id="inputUsuario" placeholder="Ingresa tu usuario o DNI" autocomplete="off" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="inputPassword" class="form-label fw-bold text-secondary small text-uppercase" style="letter-spacing: 0.5px;">Contraseña</label>
                        <div class="input-group input-group-lg shadow-sm rounded-3 overflow-hidden">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" class="form-control fs-6" id="inputPassword" placeholder="Ingresa tu contraseña" required>
                            <!-- Botón de ojito -->
                            <span class="input-group-text password-toggle" id="togglePassword">
                                <i class="fa-regular fa-eye" id="eyeIcon"></i>
                            </span>
                        </div>
                    </div>

                    <button type="submit" id="btnSubmit" class="btn btn-primary btn-lg w-100 btn-login shadow-sm mt-3">
                        Iniciar Sesión <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>
                </form>

                <!-- Enlace de recuperación -->
                <div class="text-center mt-4">
                    <a href="#" class="text-decoration-none text-muted small fw-medium" onclick="alert('Contacte a Soporte de TI o al Gerente para recuperar sus credenciales.')">
                        <i class="fa-solid fa-circle-question me-1"></i> ¿Olvidaste tu contraseña? Contacta al administrador.
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabaseConfig.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // 1. Lógica para Mostrar/Ocultar contraseña (Ojito)
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('inputPassword');
            const eyeIcon = document.getElementById('eyeIcon');

            togglePassword.addEventListener('click', function () {
                // Alternar el atributo type (password <=> text)
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                // Alternar la clase del ícono de FontAwesome
                if(type === 'text') {
                    eyeIcon.classList.remove('fa-eye');
                    eyeIcon.classList.add('fa-eye-slash');
                } else {
                    eyeIcon.classList.remove('fa-eye-slash');
                    eyeIcon.classList.add('fa-eye');
                }
            });
        });
    </script>
    <script src="./public/js/shared/utils.js"></script>
    <script src="./public/js/login.js"></script>
</body>
</html>
