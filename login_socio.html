<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITFAB S.A.C. - Acceso Socios</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            /* Fondo temático de gimnasio con una capa oscura encima */
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com/photo-1540497077202-7c8a3999166f?q=80&w=1470&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .socio-login-card {
            width: 100%;
            max-width: 380px; /* Ancho óptimo para celulares */
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            padding: 40px 30px;
            text-align: center;
        }

        .logo-circle {
            width: 85px;
            height: 85px;
            background: #0d6efd;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 10px 20px -5px rgba(13, 110, 253, 0.4);
        }

        /* Estilización de Inputs Flotantes nativos de Bootstrap 5 */
        .form-floating > .form-control {
            border-radius: 14px;
            border: 2px solid #e2e8f0;
            background-color: #f8fafc;
            padding-top: 1.625rem;
            padding-bottom: 0.625rem;
            transition: all 0.2s ease;
            font-weight: 600;
            color: #1e293b;
        }

        .form-floating > .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.15);
            background-color: #fff;
        }

        .form-floating > label {
            color: #64748b;
            font-weight: 500;
        }

        .btn-ingresar {
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px -3px rgba(13, 110, 253, 0.3);
            margin-top: 10px;
        }

        .btn-ingresar:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -3px rgba(13, 110, 253, 0.4);
        }
        
        .btn-ingresar:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="socio-login-card">
        
        <!-- Logo -->
        <div class="logo-circle">
            <i class="fa-solid fa-dumbbell fs-1"></i>
        </div>
        
        <!-- Mensaje de bienvenida -->
        <h2 class="fw-bold text-gray-800 mb-2">¡Hola!</h2>
        <p class="text-muted fw-medium mb-4">Accede a tu portal de socio</p>

        <!-- Formulario -->
        <form id="formAccesoSocio" novalidate>
            
            <!-- Campo DNI -->
            <div class="form-floating mb-3 text-start">
                <input type="text" class="form-control" id="dniSocio" placeholder="DNI" maxlength="8" pattern="\d{8}" required>
                <label for="dniSocio"><i class="fa-regular fa-id-card me-2 text-primary"></i>Ingresa tu DNI</label>
                <div class="invalid-feedback fw-medium small ps-2">
                    Ingresa un DNI válido de 8 dígitos numéricos.
                </div>
            </div>

            <!-- Campo Fecha de Nacimiento -->
            <div class="form-floating mb-4 text-start">
                <input type="date" class="form-control" id="fechaNacimiento" placeholder="Fecha de Nacimiento" required>
                <label for="fechaNacimiento"><i class="fa-regular fa-calendar-days me-2 text-primary"></i>Fecha de Nacimiento</label>
                <div class="invalid-feedback fw-medium small ps-2">
                    Por favor, selecciona tu fecha de nacimiento.
                </div>
            </div>

            <!-- Botón Principal -->
            <button type="submit" class="btn btn-primary w-100 btn-ingresar mb-4">
                Ingresar a mi perfil <i class="fa-solid fa-chevron-right ms-2 small"></i>
            </button>
        </form>

        <!-- Enlace Secundario -->
        <a href="#" class="text-decoration-none text-muted small fw-medium" onclick="alert('Dirígete a la recepción del gimnasio FITFAB para adquirir tu plan. ¡Te esperamos!')">
            ¿Aún no eres socio? <span class="text-primary fw-bold text-decoration-underline">Acércate a recepción</span>
        </a>

    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('formAccesoSocio');
            const dniInput = document.getElementById('dniSocio');

            // 1. Prevención en tiempo real: Solo permite escribir números
            dniInput.addEventListener('input', function(e) {
                this.value = this.value.replace(/[^0-9]/g, '');
            });

            // 2. Validación al enviar el formulario
            form.addEventListener('submit', function(event) {
                event.preventDefault(); // Evita recargar
                
                let isValid = true;
                
                // Extraer valores
                const dniValue = dniInput.value.trim();
                const fechaInput = document.getElementById('fechaNacimiento');
                
                // Expresión regular: Exactamente 8 dígitos del 0 al 9
                const dniRegex = /^[0-9]{8}$/;
                
                // Validar DNI
                if (!dniRegex.test(dniValue)) {
                    dniInput.classList.remove('is-valid');
                    dniInput.classList.add('is-invalid');
                    isValid = false;
                } else {
                    dniInput.classList.remove('is-invalid');
                    dniInput.classList.add('is-valid');
                }

                // Validar Fecha de Nacimiento
                if (!fechaInput.value) {
                    fechaInput.classList.remove('is-valid');
                    fechaInput.classList.add('is-invalid');
                    isValid = false;
                } else {
                    fechaInput.classList.remove('is-invalid');
                    fechaInput.classList.add('is-valid');
                }

                // 3. Flujo de Éxito
                if (isValid) {
                    const btnSubmit = form.querySelector('button[type="submit"]');
                    const originalText = btnSubmit.innerHTML;
                    
                    // Mostrar animación de carga
                    btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Validando...';
                    btnSubmit.disabled = true;

                    // Imprimir datos en consola (como requerimiento)
                    console.log('--- AUTENTICACIÓN DE SOCIO ---');
                    console.log('DNI:', dniValue);
                    console.log('Fecha Nacimiento:', fechaInput.value);

                    // Simular validación en base de datos y redirección
                    setTimeout(() => {
                        // En tu proyecto real, esto te llevará al index del socio:
                        window.location.href = 'views/socio/socio.html';
                    }, 1200);
                }
            });
        });
    </script>
<script src="./public/js/shared/utils.js"></script>
</body>
</html>
