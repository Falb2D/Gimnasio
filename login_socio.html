<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITFAB S.A.C. - Acceso Socios</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Modular -->
    <link rel="stylesheet" href="../public/css/login.css">
</head>
<body class="bg-image bg-socio">

    <div class="login-card">
        
        <!-- Logo Flotante -->
        <div class="logo-circle">
            <i class="fa-solid fa-dumbbell"></i>
        </div>
        
        <!-- Mensaje de bienvenida -->
        <h2 class="fw-bold text-dark mb-2">¡Hola!</h2>
        <p class="text-muted fw-medium mb-4">Accede a tu portal de socio</p>

        <!-- Formulario -->
        <form id="formAccesoSocio" novalidate>
            
            <!-- Campo DNI -->
            <div class="form-floating mb-3 text-start">
                <input type="text" class="form-control" id="dniSocio" placeholder="DNI" maxlength="8" pattern="\d{8}" required>
                <label for="dniSocio"><i class="fa-regular fa-id-card me-2 text-primary"></i>Ingresa tu DNI</label>
                <div class="invalid-feedback fw-medium small ps-2">
                    Ingresa un DNI válido de 8 dígitos numéricos.
                </div>
            </div>

            <!-- Campo Fecha de Nacimiento -->
            <div class="form-floating mb-4 text-start">
                <input type="date" class="form-control" id="fechaNacimiento" placeholder="Fecha de Nacimiento" required>
                <label for="fechaNacimiento"><i class="fa-regular fa-calendar-days me-2 text-primary"></i>Fecha de Nacimiento</label>
                <div class="invalid-feedback fw-medium small ps-2">
                    Por favor, selecciona tu fecha de nacimiento.
                </div>
            </div>

            <!-- Botón Principal -->
            <button type="submit" class="btn btn-primary w-100 btn-ingresar mb-4">
                Ingresar a mi perfil <i class="fa-solid fa-chevron-right ms-2 small"></i>
            </button>
        </form>

        <!-- Enlace Secundario -->
        <a href="#" class="text-decoration-none text-muted small fw-medium" onclick="alert('Dirígete a la recepción del gimnasio FITFAB para adquirir tu plan. ¡Te esperamos!')">
            ¿Aún no eres socio? <span class="text-primary fw-bold text-decoration-underline">Acércate a recepción</span>
        </a>

    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('formAccesoSocio');
            const dniInput = document.getElementById('dniSocio');

            // 1. Prevención en tiempo real: Solo permite escribir números
            dniInput.addEventListener('input', function(e) {
                this.value = this.value.replace(/[^0-9]/g, '');
            });

            // 2. Validación al enviar el formulario
            form.addEventListener('submit', function(event) {
                event.preventDefault(); // Evita recargar
                
                let isValid = true;
                
                // Extraer valores
                const dniValue = dniInput.value.trim();
                const fechaInput = document.getElementById('fechaNacimiento');
                
                // Expresión regular: Exactamente 8 dígitos del 0 al 9
                const dniRegex = /^[0-9]{8}$/;
                
                // Validar DNI
                if (!dniRegex.test(dniValue)) {
                    dniInput.classList.remove('is-valid');
                    dniInput.classList.add('is-invalid');
                    isValid = false;
                } else {
                    dniInput.classList.remove('is-invalid');
                    dniInput.classList.add('is-valid');
                }

                // Validar Fecha de Nacimiento
                if (!fechaInput.value) {
                    fechaInput.classList.remove('is-valid');
                    fechaInput.classList.add('is-invalid');
                    isValid = false;
                } else {
                    fechaInput.classList.remove('is-invalid');
                    fechaInput.classList.add('is-valid');
                }

                // 3. Flujo de Éxito
                if (isValid) {
                    const btnSubmit = form.querySelector('button[type="submit"]');
                    const originalText = btnSubmit.innerHTML;
                    
                    // Mostrar animación de carga
                    btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Validando...';
                    btnSubmit.disabled = true;

                    // Imprimir datos en consola (como requerimiento)
                    console.log('--- AUTENTICACIÓN DE SOCIO ---');
                    console.log('DNI:', dniValue);
                    console.log('Fecha Nacimiento:', fechaInput.value);

                    // Simular validación en base de datos y redirección
                    setTimeout(() => {
                        // En tu proyecto real, esto te llevará al index del socio:
                        window.location.href = 'views/socio/socio.html';
                    }, 1200);
                }
            });
        });
    </script>
<script src="./public/js/shared/utils.js"></script>
</body>
</html>
