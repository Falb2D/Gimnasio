<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITFAB S.A.C. - Recepción | Pagos</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../public/css/styles.css">
</head>
<body>
    <div class="wrapper d-flex">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar bg-dark text-white shadow">
            <div class="sidebar-header p-3 border-bottom border-secondary d-flex justify-content-between align-items-center">
                <h4 class="m-0 fw-bold d-flex align-items-center">
                    <i class="fa-solid fa-dumbbell text-primary me-2"></i> FITFAB
                </h4>
                <button type="button" id="sidebarClose" class="btn text-white d-md-none p-0">
                    <i class="fa-solid fa-xmark fs-4"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav py-4 px-2">
                <ul class="nav flex-column gap-1">
                    <li class="nav-item">
                        <a href="./recepcion.html" class="nav-link rounded text-white">
                            <i class="fa-solid fa-id-card-clip fa-fw me-2"></i> Control de Acceso
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="./recepcion_socios.html" class="nav-link rounded text-white">
                            <i class="fa-solid fa-users fa-fw me-2"></i> Gestión de Socios
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="./recepcion_pagos.html" class="nav-link rounded text-white active">
                            <i class="fa-solid fa-file-invoice-dollar fa-fw me-2"></i> Pagos y Facturación
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="./recepcion_clases.html" class="nav-link rounded text-white">
                            <i class="fa-regular fa-calendar-check fa-fw me-2"></i> Clases y Reservas
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <div class="main-content flex-grow-1 d-flex flex-column">
            
            <!-- Header -->
            <header class="header bg-white shadow-sm px-4 py-3 d-flex justify-content-between align-items-center z-1">
                <div class="d-flex align-items-center">
                    <button id="sidebarToggle" class="btn btn-light d-md-none me-3 border-0">
                        <i class="fa-solid fa-bars fs-5"></i>
                    </button>
                    <!-- Visible on small screens, hidden when very narrow if needed -->
                    <h5 class="m-0 fw-bold text-dark d-none d-sm-block">FITFAB S.A.C.</h5>
                </div>
                
                <div class="user-profile d-flex align-items-center gap-3">
                    <div class="text-end d-none d-md-block">
                        <p class="m-0 fw-semibold text-dark lh-1">Recepcionista</p>
                        <small class="text-success fw-medium" style="font-size: 0.75rem;">
                            <i class="fa-solid fa-circle" style="font-size: 0.5rem; vertical-align: middle;"></i> En turno
                        </small>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=Recepcionista&background=0D6EFD&color=fff&rounded=true" alt="Recepcionista" class="rounded-circle shadow-sm" width="40" height="40">
                    <button class="btn btn-outline-danger btn-sm d-none d-sm-flex align-items-center ms-2 fw-medium">
                        <i class="fa-solid fa-right-from-bracket me-2"></i> Cerrar Sesión
                    </button>
                    <!-- Mobile logout icon -->
                    <button class="btn btn-danger btn-sm d-sm-none">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </header>

            <!-- Dynamic Content Area -->
            <main class="p-4 flex-grow-1 overflow-auto">
                <div class="container-fluid px-0">
                    <!-- Header -->
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
                        <div>
                            <h2 class="h3 mb-1 fw-bold text-gray-800">Historial de Pagos y Caja</h2>
                            <p class="text-muted mb-0">Registro de movimientos y cuadre de caja diario.</p>
                        </div>
                    </div>

                    <!-- Main Card -->
                    <div class="card border-0 shadow-sm rounded-4 mb-4">
                        <div class="card-body p-4 bg-light rounded-4">
                            <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-4 px-2 gap-3">
                                <h5 class="fw-bold text-gray-800 m-0">Movimientos de Hoy</h5>
                                <div class="d-flex align-items-center gap-3">
                                    <input type="date" class="form-control shadow-sm border-0 bg-white text-muted" id="filtroFechaCaja" style="max-width: 150px;">
                                    <div class="bg-success bg-opacity-10 text-success fw-bold px-4 py-2 rounded-pill border border-success border-opacity-25 fs-5" id="badgeTotalCaja">
                                        <i class="fa-solid fa-sack-dollar me-2"></i> Total en Caja: S/ 0.00
                                    </div>
                                </div>
                            </div>
                            <div class="card border-0 shadow-sm rounded-4">
                                <div class="card-body p-0">
                                    <div class="table-responsive">
                                        <table class="table table-hover align-middle mb-0">
                                            <thead class="table-light">
                                                <tr>
                                                    <th class="ps-4 py-3 text-muted fw-semibold">Hora</th>
                                                    <th class="py-3 text-muted fw-semibold">Socio</th>
                                                    <th class="py-3 text-muted fw-semibold">Plan</th>
                                                    <th class="py-3 text-muted fw-semibold">Monto</th>
                                                    <th class="py-3 text-muted fw-semibold">Método</th>
                                                    <th class="pe-4 py-3 text-muted fw-semibold text-center">Acciones</th>
                                                </tr>
                                            </thead>
                                            <tbody id="tablaHistorialBody">
                                                <!-- Dynamic Content -->
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <!-- Custom JS -->
    <script src="../../public/js/admin/script.js"></script>
    <script src="../../public/js/shared/utils.js"></script>
    <script src="../../public/js/recepcion/pagos.js"></script>
</body>
</html>
