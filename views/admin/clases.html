<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FITFAB S.A.C. - Clases y Reservas</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../public/css/styles.css" />
  </head>
  <body>
    <div class="wrapper d-flex">
      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar bg-dark text-white shadow">
        <div class="sidebar-header">
          <img src="../../public/img/fitfab.jpg" alt="FITFAB" class="sidebar-logo">
          <span class="sidebar-brand-text">FITFAB S.A.C.</span>
          <button type="button" id="sidebarToggleBtn" class="sidebar-toggle-btn ms-auto">
            <i class="fa-solid fa-xmark icon-collapse"></i>
            <i class="fa-solid fa-bars icon-expand"></i>
          </button>
        </div>
        <nav class="sidebar-nav py-3 px-2">
          <ul class="nav flex-column gap-1">
            <li class="nav-item">
              <a href="./index.html" class="nav-link rounded d-flex align-items-center gap-2" title="Dashboard">
                <i class="fa-solid fa-chart-line fa-fw flex-shrink-0"></i>
                <span class="nav-text">Dashboard</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="./socios.html" class="nav-link rounded d-flex align-items-center gap-2" title="Socios">
                <i class="fa-solid fa-users fa-fw flex-shrink-0"></i>
                <span class="nav-text">Socios</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="./clases.html" class="nav-link rounded active d-flex align-items-center gap-2" title="Clases y Reservas">
                <i class="fa-regular fa-calendar-check fa-fw flex-shrink-0"></i>
                <span class="nav-text">Clases y Reservas</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="./pagos.html" class="nav-link rounded d-flex align-items-center gap-2" title="Pagos y Facturación">
                <i class="fa-solid fa-file-invoice-dollar fa-fw flex-shrink-0"></i>
                <span class="nav-text">Pagos y Facturación</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="./mantenimiento.html" class="nav-link rounded d-flex align-items-center gap-2" title="Mantenimiento de Equipos">
                <i class="fa-solid fa-wrench fa-fw flex-shrink-0"></i>
                <span class="nav-text">Mantenimiento de Equipos</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="./configuracion.html" class="nav-link rounded d-flex align-items-center gap-2" title="Configuración">
                <i class="fa-solid fa-gear fa-fw flex-shrink-0"></i>
                <span class="nav-text">Configuración</span>
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <!-- Main Content Area -->
      <div class="main-content flex-grow-1 d-flex flex-column">
        <!-- Header -->
        <header
          class="header bg-white shadow-sm px-4 py-3 d-flex justify-content-between align-items-center z-1"
        >
          <div class="d-flex align-items-center">
            <button
              id="sidebarToggle"
              class="btn btn-light d-md-none me-3 border-0"
            >
              <i class="fa-solid fa-bars fs-5"></i>
            </button>
            <h5 class="m-0 fw-bold text-dark d-none d-sm-block">
              FITFAB S.A.C.
            </h5>
          </div>

          <div class="user-profile d-flex align-items-center gap-3">
            <div class="text-end d-none d-md-block">
              <p class="m-0 fw-semibold text-dark lh-1">Administrador</p>
              <small class="text-success fw-medium" style="font-size: 0.75rem">
                <i
                  class="fa-solid fa-circle"
                  style="font-size: 0.5rem; vertical-align: middle"
                ></i>
                En línea
              </small>
            </div>
            <img
              src="https://ui-avatars.com/api/?name=Admin&background=0D6EFD&color=fff&rounded=true"
              alt="Admin"
              class="rounded-circle shadow-sm"
              width="40"
              height="40"
            />
            <button
              class="btn btn-outline-danger btn-sm d-none d-sm-flex align-items-center ms-2 fw-medium"
            >
              <i class="fa-solid fa-right-from-bracket me-2"></i> Cerrar Sesión
            </button>
            <!-- Mobile logout icon -->
            <button class="btn btn-danger btn-sm d-sm-none">
              <i class="fa-solid fa-right-from-bracket"></i>
            </button>
          </div>
        </header>

        <!-- Dynamic Content Area -->
        <main class="p-4 flex-grow-1 overflow-auto">
          <div class="container-fluid px-0">
            <!-- Header of the view -->
            <div
              class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3"
            >
              <div>
                <h2 class="h3 mb-1 fw-bold text-gray-800">Clases y Reservas</h2>
                <p class="text-muted mb-0">
                  Gestión de aforo, horarios y listas de asistentes.
                </p>
              </div>
              <button
                class="btn btn-primary shadow-sm"
                data-bs-toggle="modal"
                data-bs-target="#modalNuevaClase"
              >
                <i class="fa-solid fa-calendar-plus me-2"></i> Programar Nueva
                Clase
              </button>
            </div>

            <!-- Classes Grid (render dinámico por JS) -->
            <div id="contenedorClases" class="row g-4"></div>
          </div>
        </main>
      </div>
    </div>

    <!-- Modal Programar Clase -->
    <div
      class="modal fade"
      id="modalNuevaClase"
      tabindex="-1"
      aria-labelledby="modalNuevaClaseLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content rounded-4 border-0 shadow-lg">
          <div class="modal-header border-bottom pb-3">
            <h5
              class="modal-title fw-bold text-gray-800"
              id="modalNuevaClaseLabel"
            >
              Programar Nueva Clase
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body p-4">
            <form id="formNuevaClase">
              <div class="row g-4">
                <div class="col-md-6">
                  <label
                    for="nombreClase"
                    class="form-label fw-medium text-muted small mb-1"
                    >Nombre de la clase
                    <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="nombreClase"
                    placeholder="Ej. Yoga, Zumba, CrossFit"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label
                    for="entrenadorClase"
                    class="form-label fw-medium text-muted small mb-1"
                    >Entrenador(a) <span class="text-danger">*</span></label
                  >
                  <select class="form-select" id="entrenadorClase" required>
                    <option value="" selected disabled>
                      Seleccionar entrenador...
                    </option>
                    <option value="1">Valeria S.</option>
                    <option value="2">Marcos T.</option>
                    <option value="3">Luis R.</option>
                    <option value="4">Sofía M.</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label
                    for="fechaHoraClase"
                    class="form-label fw-medium text-muted small mb-1"
                    >Fecha y Hora <span class="text-danger">*</span></label
                  >
                  <input
                    type="datetime-local"
                    class="form-control"
                    id="fechaHoraClase"
                    required
                  />
                </div>
                <div class="col-md-3">
                  <label
                    for="capacidadClase"
                    class="form-label fw-medium text-muted small mb-1"
                    >Capacidad Max. <span class="text-danger">*</span></label
                  >
                  <input
                    type="number"
                    class="form-control"
                    id="capacidadClase"
                    min="1"
                    max="100"
                    placeholder="Ej. 20"
                    required
                  />
                </div>
                <div class="col-md-3">
                  <label
                    for="ubicacionClase"
                    class="form-label fw-medium text-muted small mb-1"
                    >Ubicación <span class="text-danger">*</span></label
                  >
                  <select class="form-select" id="ubicacionClase" required>
                    <option value="" selected disabled>Ubicación...</option>
                    <option value="Salón Zen">Salón Zen</option>
                    <option value="Salón Cardio 1">Salón Cardio 1</option>
                    <option value="Box Funcional">Box Funcional</option>
                    <option value="Sala Principal">Sala Principal</option>
                  </select>
                </div>
              </div>
            </form>
          </div>
          <div
            class="modal-footer border-top pt-3 pb-4 px-4 bg-light rounded-bottom-4"
          >
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="submit"
              form="formNuevaClase"
              class="btn btn-primary px-4"
            >
              <i class="fa-solid fa-save me-2"></i>Guardar Programación
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Lista de Asistentes -->
    <div
      class="modal fade"
      id="modalAsistentes"
      tabindex="-1"
      aria-labelledby="modalAsistentesLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content rounded-4 border-0 shadow-lg">
          <div class="modal-header border-bottom pb-3">
            <h5
              class="modal-title fw-bold text-gray-800"
              id="modalAsistentesLabel"
            >
              Asistentes:
              <span id="nombreClaseModal" class="text-primary"></span>
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body p-4">
            <ul class="list-group list-group-flush" id="listaAsistentesModal">
              <!-- Nombres inyectados dinámicamente -->
            </ul>
          </div>
          <div
            class="modal-footer border-top pt-3 pb-3 px-4 bg-light rounded-bottom-4"
          >
            <button
              type="button"
              class="btn btn-primary px-4"
              data-bs-dismiss="modal"
            >
              Cerrar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Editar Clase -->
    <div
      class="modal fade"
      id="modalEditarClase"
      tabindex="-1"
      aria-labelledby="modalEditarClaseLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content rounded-4 border-0 shadow-lg">
          <div class="modal-header border-bottom pb-3">
            <h5
              class="modal-title fw-bold text-gray-800"
              id="modalEditarClaseLabel"
            >
              Editar Clase
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body p-4">
            <form id="formEditarClase">
              <input type="hidden" id="editarIdClase" />
              <div class="row g-4">
                <div class="col-md-6">
                  <label
                    for="editarNombreClase"
                    class="form-label fw-medium text-muted small mb-1"
                    >Nombre de la clase
                    <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="editarNombreClase"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label
                    for="editarEntrenadorClase"
                    class="form-label fw-medium text-muted small mb-1"
                    >Entrenador(a) <span class="text-danger">*</span></label
                  >
                  <select
                    class="form-select"
                    id="editarEntrenadorClase"
                    required
                  >
                    <option value="" selected disabled>
                      Seleccionar entrenador...
                    </option>
                    <option value="1">Valeria S.</option>
                    <option value="2">Marcos T.</option>
                    <option value="3">Luis R.</option>
                    <option value="4">Sofía M.</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label
                    for="editarHoraInicioClase"
                    class="form-label fw-medium text-muted small mb-1"
                    >Hora de inicio <span class="text-danger">*</span></label
                  >
                  <input
                    type="time"
                    class="form-control"
                    id="editarHoraInicioClase"
                    required
                  />
                </div>
                <div class="col-md-3">
                  <label
                    for="editarCapacidadClase"
                    class="form-label fw-medium text-muted small mb-1"
                    >Capacidad Max. <span class="text-danger">*</span></label
                  >
                  <input
                    type="number"
                    class="form-control"
                    id="editarCapacidadClase"
                    min="1"
                    max="100"
                    required
                  />
                </div>
                <div class="col-md-3">
                  <label
                    for="editarUbicacionClase"
                    class="form-label fw-medium text-muted small mb-1"
                    >Ubicación <span class="text-danger">*</span></label
                  >
                  <select
                    class="form-select"
                    id="editarUbicacionClase"
                    required
                  >
                    <option value="" selected disabled>Ubicación...</option>
                    <option value="Salón Zen">Salón Zen</option>
                    <option value="Salón Cardio 1">Salón Cardio 1</option>
                    <option value="Box Funcional">Box Funcional</option>
                    <option value="Sala Principal">Sala Principal</option>
                  </select>
                </div>
              </div>
            </form>
          </div>
          <div
            class="modal-footer border-top pt-3 pb-4 px-4 bg-light rounded-bottom-4"
          >
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="submit"
              form="formEditarClase"
              class="btn btn-primary px-4"
            >
              <i class="fa-solid fa-save me-2"></i>Guardar Cambios
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../supabaseConfig.js"></script>
    <!-- Custom JS -->
    <script src="../../public/js/admin/script.js"></script>
    <script src="../../public/js/shared/clasesService.js"></script>
    <script src="../../public/js/admin/clases.js"></script>
    <script src="../../public/js/shared/utils.js"></script>
  </body>
</html>
