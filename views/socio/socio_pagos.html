<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FITFAB S.A.C. - Mis Pagos</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../public/css/styles.css" />
  </head>
  <body>
    <div class="d-flex flex-column flex-lg-row min-vh-100">
      <aside id="sidebar" class="sidebar bg-dark text-white shadow d-flex flex-column">
        <div class="sidebar-header">
          <img src="../../public/img/fitfab.jpg" alt="FITFAB" class="sidebar-logo">
          <span class="sidebar-brand-text">FITFAB S.A.C.</span>
          <button type="button" id="sidebarToggleBtn" class="sidebar-toggle-btn ms-auto">
            <i class="fa-solid fa-xmark icon-collapse"></i>
            <i class="fa-solid fa-bars icon-expand"></i>
          </button>
        </div>
        <nav class="nav nav-pills flex-column gap-2 p-3 flex-grow-1">
          <a href="./socio.html" id="navMiQR" class="nav-link d-flex align-items-center gap-2">
            <i class="fa-solid fa-qrcode fa-fw flex-shrink-0"></i>
            <span class="nav-text">Mi QR</span>
          </a>
          <a href="./socio_clases.html" id="navReservarClases" class="nav-link d-flex align-items-center gap-2">
            <i class="fa-regular fa-calendar-check fa-fw flex-shrink-0"></i>
            <span class="nav-text">Reservar Clases</span>
          </a>
          <a href="./socio_pagos.html" id="navMisPagos" class="nav-link active d-flex align-items-center gap-2">
            <i class="fa-solid fa-file-invoice-dollar fa-fw flex-shrink-0"></i>
            <span class="nav-text">Mis Pagos</span>
          </a>
        </nav>
        <div class="p-3 mt-auto border-top border-white border-opacity-10">
          <a href="#" class="btn btn-outline-light btn-logout w-100 rounded-4 py-2 d-flex align-items-center justify-content-center gap-2">
            <i class="fa-solid fa-right-from-bracket fa-fw flex-shrink-0"></i>
            <span class="nav-text">Cerrar Sesión</span>
          </a>
        </div>
      </aside>

      <main class="main-pane flex-fill bg-light p-4">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-12 col-lg-10">
              <div id="portalEstadoBanner"></div>
              <div class="mb-4 text-center">
                <h3 class="fw-bold text-gray-800">Mi Membresía</h3>
                <p class="text-muted small">
                  Revisa tu estado de cuenta y comprobantes.
                </p>
              </div>

              <div
                class="card border-0 shadow-lg rounded-4 overflow-hidden mb-5"
                id="estadoResumenPago"
              >
                <div
                  class="bg-primary text-white p-4"
                  id="estadoResumenPagoHeader"
                >
                  <div
                    class="d-flex justify-content-between align-items-center mb-3"
                  >
                    <h5 class="fw-bold m-0 letter-spacing-1">Tu Plan Actual</h5>
                    <span
                      id="estadoPagoBadge"
                      class="badge bg-white text-primary rounded-pill px-3 py-2 fw-bold shadow-sm"
                      ><i class="fa-solid fa-circle-check me-1"></i>
                      Activo</span
                    >
                  </div>
                  <h2 id="resumenPlanNombre" class="fw-bold mb-0">—</h2>
                </div>
                <div class="card-body p-4 bg-white">
                  <div
                    class="d-flex justify-content-between align-items-center pb-3 border-bottom border-light mb-3"
                  >
                    <div>
                      <p class="text-muted small fw-medium mb-1">
                        <i class="fa-regular fa-calendar text-primary me-1"></i>
                        Próximo Vencimiento
                      </p>
                      <h6 id="resumenVencimiento" class="fw-bold text-gray-800 m-0">—</h6>
                    </div>
                    <div class="text-end">
                      <p class="text-muted small fw-medium mb-1">
                        <i
                          class="fa-solid fa-circle-exclamation text-success me-1"
                        ></i>
                        Deuda Pendiente
                      </p>
                      <h6 id="deudaMonto" class="fw-bold text-success m-0">
                        S/ 0.00
                      </h6>
                    </div>
                  </div>
                  <div
                    id="estadoPagoAlert"
                    class="alert alert-success d-flex align-items-center rounded-3 mb-0 border-0 shadow-sm"
                    role="alert"
                  >
                    <i class="fa-solid fa-face-smile-wink fs-4 me-3"></i>
                    <div class="small fw-medium">
                      ¡Estás al día con tus pagos! Disfruta de tu entrenamiento.
                    </div>
                  </div>
                </div>
              </div>

              <h5 class="fw-bold text-gray-800 mb-3 px-2">
                Historial de Pagos
              </h5>
              <div
                class="list-group shadow-sm rounded-4 border-0 mb-5"
                id="historialPagosList"
              ></div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../supabaseConfig.js"></script>
    <script src="../../public/js/shared/utils.js"></script>
    <script src="../../public/js/socio/app.js"></script>
  </body>
</html>
