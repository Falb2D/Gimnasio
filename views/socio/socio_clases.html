<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITFAB S.A.C. - Reservar Clases</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../public/css/styles.css">
    <style>
        body {
            background-color: #f1f5f9;
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        /* Contenedor escroleable para botones en móviles pequeños */
        .date-filter-container {
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 5px;
        }
        .date-filter-container::-webkit-scrollbar {
            height: 0px; /* Hide scrollbar for clean look */
        }
        .nav-link-hover {
            transition: all 0.2s ease-in-out;
        }
        .nav-link-hover:hover {
            color: #0d6efd !important;
            background-color: rgba(13, 110, 253, 0.05);
            border-radius: 0.375rem;
        }
    </style>
</head>
<body>

    <!-- Navbar Superior -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center text-dark" href="./socio.html">
                <div class="bg-primary text-white rounded d-inline-flex justify-content-center align-items-center me-2 shadow-sm" style="width: 32px; height: 32px;">
                    <i class="fa-solid fa-dumbbell fs-6"></i>
                </div>
                FITFAB
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSocio" aria-controls="navbarSocio" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSocio">
                <ul class="navbar-nav ms-auto mt-3 mt-lg-0 gap-2 text-center text-lg-start">
                    <li class="nav-item">
                        <a class="nav-link nav-link-hover fw-medium px-3 py-2 text-dark" href="./socio.html">
                            <i class="fa-solid fa-qrcode me-2"></i> Mi QR
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-hover active fw-medium px-3 py-2 rounded text-primary bg-primary bg-opacity-10" href="./socio_clases.html">
                            <i class="fa-regular fa-calendar-check me-2"></i> Reservar Clases
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-hover fw-medium px-3 py-2 text-dark" href="./socio_pagos.html">
                            <i class="fa-solid fa-file-invoice-dollar me-2"></i> Mis Pagos
                        </a>
                    </li>
                    <li class="nav-item mt-2 mt-lg-0 border-top border-light pt-2 pt-lg-0 border-lg-0">
                        <a class="nav-link nav-link-hover fw-medium text-danger px-3 py-2" href="#">
                            <i class="fa-solid fa-right-from-bracket me-2"></i> Cerrar Sesión
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content (Mobile Centric) -->
    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 px-2 px-sm-3">
                
                <!-- Título -->
                <div class="mb-4 text-center">
                    <h3 class="fw-bold text-gray-800">Reserva tu Clase</h3>
                    <p class="text-muted small">Asegura tu lugar en nuestras sesiones grupales.</p>
                </div>

                <!-- Filtro de Días -->
                <div class="date-filter-container mb-4">
                    <div class="btn-group w-100 shadow-sm" role="group" aria-label="Filtro de Días">
                        <input type="radio" class="btn-check" name="btnradio" id="btnHoy" autocomplete="off" checked>
                        <label class="btn btn-outline-primary fw-medium px-3 py-2" for="btnHoy">Hoy</label>

                        <input type="radio" class="btn-check" name="btnradio" id="btnManana" autocomplete="off">
                        <label class="btn btn-outline-primary fw-medium px-3 py-2" for="btnManana">Mañana</label>

                        <input type="radio" class="btn-check" name="btnradio" id="btnMiercoles" autocomplete="off">
                        <label class="btn btn-outline-primary fw-medium px-3 py-2" for="btnMiercoles">Miércoles</label>
                    </div>
                </div>

                <!-- Lista de Clases -->
                <div class="row" id="contenedorClases">
                    <!-- Renderizado dinámicamente -->
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 para alertas atractivas -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
<script src="../../public/js/shared/utils.js"></script>
<script src="../../public/js/socio/app.js"></script>
</body>
</html>
