<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FITFAB S.A.C. - Reservar Clases</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../public/css/styles.css" />
  </head>
  <body>
    <div class="d-flex flex-column flex-lg-row min-vh-100">
      <aside class="sidebar d-flex flex-column p-4" id="portalSidebar">
        <a
          href="./socio.html"
          class="d-flex align-items-center gap-3 mb-5 text-white text-decoration-none"
        >
          <div class="logo-brand">
            <i class="fa-solid fa-dumbbell"></i>
          </div>
          <div>
            <h5 class="mb-0 fw-bold">FITFAB</h5>
            <small class="text-white-50">Portal Socio</small>
          </div>
        </a>
        <nav class="nav nav-pills flex-column gap-2 mb-4">
          <a
            href="./socio.html"
            id="navMiQR"
            class="nav-link d-flex align-items-center gap-2"
            ><i class="fa-solid fa-qrcode"></i> Mi QR</a
          >
          <a
            href="./socio_clases.html"
            id="navReservarClases"
            class="nav-link active d-flex align-items-center gap-2"
            ><i class="fa-regular fa-calendar-check"></i> Reservar Clases</a
          >
          <a
            href="./socio_pagos.html"
            id="navMisPagos"
            class="nav-link d-flex align-items-center gap-2"
            ><i class="fa-solid fa-file-invoice-dollar"></i> Mis Pagos</a
          >
        </nav>
        <div class="mt-auto pt-4">
          <a
            href="#"
            class="btn btn-outline-light btn-logout w-100 rounded-4 py-2 d-flex align-items-center justify-content-center gap-2"
          >
            <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
          </a>
        </div>
      </aside>

      <main class="main-pane flex-fill bg-light p-4">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-12 col-lg-10">
              <div id="portalEstadoBanner"></div>
              <div class="mb-4 text-center">
                <h3 class="fw-bold text-gray-800">Reserva tu Clase</h3>
                <p class="text-muted small">
                  Asegura tu lugar en nuestras sesiones grupales.
                </p>
              </div>

              <div class="date-filter-container mb-4">
                <div
                  class="btn-group w-100 shadow-sm"
                  role="group"
                  aria-label="Filtro de Días"
                >
                  <input
                    type="radio"
                    class="btn-check"
                    name="btnradio"
                    id="btnHoy"
                    autocomplete="off"
                    checked
                  />
                  <label
                    class="btn btn-outline-primary fw-medium px-3 py-2"
                    for="btnHoy"
                    >Hoy</label
                  >

                  <input
                    type="radio"
                    class="btn-check"
                    name="btnradio"
                    id="btnManana"
                    autocomplete="off"
                  />
                  <label
                    class="btn btn-outline-primary fw-medium px-3 py-2"
                    for="btnManana"
                    >Mañana</label
                  >

                  <input
                    type="radio"
                    class="btn-check"
                    name="btnradio"
                    id="btnMiercoles"
                    autocomplete="off"
                  />
                  <label
                    class="btn btn-outline-primary fw-medium px-3 py-2"
                    for="btnMiercoles"
                    >Miércoles</label
                  >
                </div>
              </div>

              <div class="row g-4" id="contenedorClases"></div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../supabaseConfig.js"></script>
    <script src="../../public/js/shared/utils.js"></script>
    <script src="../../public/js/socio/app.js"></script>
  </body>
</html>
