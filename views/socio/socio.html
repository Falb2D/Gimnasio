<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FITFAB S.A.C. - Mi Perfil</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../public/css/styles.css" />
    <style>
      body {
        background-color: #f8fafc;
        min-height: 100vh;
      }
      .sidebar {
        min-width: 260px;
        max-width: 280px;
        background: #111827;
        min-height: 100vh;
        color: #e2e8f0;
      }
      .sidebar .logo-brand {
        width: 40px;
        height: 40px;
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #0d6efd;
        color: #ffffff;
        box-shadow: 0 18px 40px rgba(13, 110, 253, 0.18);
      }
      .sidebar .nav-link {
        color: #cbd5e1;
        background: transparent;
        border-radius: 0.95rem;
        padding: 0.9rem 1.2rem;
        transition: all 0.2s ease;
      }
      .sidebar .nav-link:hover,
      .sidebar .nav-link.active {
        color: #ffffff;
        background: rgba(255, 255, 255, 0.08);
      }
      .sidebar .nav-link.active {
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }
      .sidebar .btn-logout {
        border-color: rgba(255, 255, 255, 0.12);
        color: #f8fafc;
      }
      .main-pane {
        min-height: 100vh;
        background: #f8fafc;
      }
      .socio-card {
        width: 100%;
        max-width: 520px;
        border: none;
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 32px 70px rgba(15, 23, 42, 0.12);
        background: #ffffff;
        position: relative;
      }
      .socio-card .card-header {
        background: #0d6efd;
        color: #fff;
        padding: 2.5rem 1.75rem 2rem;
      }
      .socio-card .card-body {
        position: relative;
        padding: 2rem 1.75rem 2.5rem;
      }
      .qr-container {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 1.25rem;
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 22px 40px rgba(15, 23, 42, 0.08);
        margin: 0 auto;
        min-width: 260px;
        min-height: 260px;
      }
      .qr-locked {
        filter: grayscale(1) opacity(0.75);
      }
      .estado-badge {
        transition: all 0.2s ease;
      }
      .estado-active {
        background: #dcfce7;
        border-color: #22c55e;
        color: #166534;
      }
      .estado-alert {
        background: #fef3c7;
        border-color: #f59e0b;
        color: #92400e;
      }
      .estado-deudor {
        background: #fee2e2;
        border-color: #dc2626;
        color: #991b1b;
      }
      .state-buttons {
        position: absolute;
        top: 1rem;
        right: 1rem;
        z-index: 10;
      }
      .state-buttons .btn {
        min-width: 110px;
      }
      @media (max-width: 991px) {
        .sidebar {
          width: 100%;
          max-width: none;
          min-height: auto;
        }
        .main-pane {
          padding-top: 1.5rem;
        }
        .state-buttons {
          position: static;
          margin-bottom: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="d-flex flex-column flex-lg-row min-vh-100">
      <aside class="sidebar d-flex flex-column p-4">
        <a
          href="./socio.html"
          class="d-flex align-items-center gap-3 mb-5 text-white text-decoration-none"
        >
          <div class="logo-brand">
            <i class="fa-solid fa-dumbbell"></i>
          </div>
          <div>
            <h5 class="mb-0 fw-bold">FITFAB</h5>
            <small class="text-white-50">Portal Socio</small>
          </div>
        </a>
        <nav class="nav nav-pills flex-column gap-2 mb-4">
          <a
            href="./socio.html"
            id="navMiQR"
            class="nav-link active d-flex align-items-center gap-2"
            ><i class="fa-solid fa-qrcode"></i> Mi QR</a
          >
          <a
            href="./socio_clases.html"
            id="navReservarClases"
            class="nav-link d-flex align-items-center gap-2"
            ><i class="fa-regular fa-calendar-check"></i> Reservar Clases</a
          >
          <a
            href="./socio_pagos.html"
            id="navMisPagos"
            class="nav-link d-flex align-items-center gap-2"
            ><i class="fa-solid fa-file-invoice-dollar"></i> Mis Pagos</a
          >
        </nav>
        <div class="mt-auto pt-4">
          <a
            href="#"
            class="btn btn-outline-light btn-logout w-100 rounded-4 py-2 d-flex align-items-center justify-content-center gap-2"
          >
            <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
          </a>
        </div>
      </aside>

      <main class="main-pane flex-fill bg-light p-4">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
              <div id="portalEstadoBanner"></div>
              <div class="state-buttons d-flex gap-2 flex-wrap mb-4">
          <button
            type="button"
            class="btn btn-sm btn-outline-success"
            onclick="mostrarEstado('Activo')"
          >
            Test Activo
          </button>
          <button
            type="button"
            class="btn btn-sm btn-outline-warning"
            onclick="mostrarEstado('Alerta')"
          >
            Test Alerta
          </button>
          <button
            type="button"
            class="btn btn-sm btn-outline-danger"
            onclick="mostrarEstado('Deudor')"
          >
            Test Deudor
          </button>
        </div>

        <div class="card socio-card status-active" id="socioCard">
          <div class="card-header text-center">
            <h6 class="fw-bold m-0 letter-spacing-1">
              <i class="fa-solid fa-id-card-clip me-2"></i> PASE DE ACCESO
            </h6>
          </div>
          <div class="card-body text-center">
            <div class="position-relative">
              <img
                src="https://ui-avatars.com/api/?name=Carlos+Mendoza&background=f8fafc&color=0d6efd&rounded=true&size=120"
                alt="Avatar Socio"
                class="rounded-circle border border-4 border-white shadow-sm"
                style="
                  width: 92px;
                  height: 92px;
                  background: white;
                  position: relative;
                  top: -48px;
                "
              />
            </div>
            <div class="mt-3 mb-4">
              <h4 class="fw-bold text-gray-800 mb-1">Carlos Mendoza</h4>
              <p class="text-muted mb-3 fw-medium small">Socio #12345</p>
              <div
                id="badgeEstado"
                class="estado-badge d-inline-block estado-active px-4 py-2 rounded-pill border mb-3 shadow-sm"
              >
                <span class="fw-bold text-success fs-6"
                  ><i class="fa-solid fa-circle-check me-2"></i> Membresía
                  Activa</span
                >
              </div>
            </div>

            <div
              class="bg-light rounded-4 p-3 mb-4 text-start border shadow-sm"
            >
              <div
                class="d-flex justify-content-between mb-2 pb-2 border-bottom"
              >
                <span class="text-muted fw-semibold small"
                  ><i class="fa-solid fa-crown text-warning me-1"></i>
                  Plan</span
                >
                <span class="fw-bold text-dark small">Mensual Ilimitado</span>
              </div>
              <div class="d-flex justify-content-between align-items-center">
                <span class="text-muted fw-semibold small"
                  ><i class="fa-regular fa-calendar text-primary me-1"></i>
                  Vencimiento</span
                >
                <span class="fw-bold text-dark small">15 Jun 2026</span>
              </div>
            </div>

            <p class="text-muted small fw-semibold mb-2 mt-4 text-uppercase">
              Tu Código de Ingreso
            </p>
            <div
              class="qr-container bg-white border border-light rounded-4"
              id="qrcode"
            ></div>
            <div id="estadoMensaje" class="mt-4"></div>
          </div>
        </div>
      </div>
    </div>
      </main>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- QRCode.js Librería -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="../../public/js/shared/utils.js"></script>
    <script src="../../public/js/socio/app.js"></script>
  </body>
</html>
